name: CI

on:
  push:
    branches: [slave, main, develop]
  pull_request:
    branches: [slave, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type check and build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check Electron
        run: ./node_modules/.bin/tsc --noEmit -p tsconfig.json

      - name: Type check renderer
        run: ./node_modules/.bin/tsc --noEmit -p src/tsconfig.json

      - name: Build application
        run: npm run build

  linux-package:
    name: Build Linux packages
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage and Debian package
        run: npm run package:linux

      - name: Validate Linux packages
        run: |
          test -s dist/Consiglio-*.AppImage
          test -s dist/Consiglio-*.deb
          dpkg-deb --info dist/Consiglio-*.deb

      - name: Upload Linux packages
        uses: actions/upload-artifact@v6
        with:
          name: Consiglio-linux-${{ github.sha }}
          path: |
            dist/Consiglio-*.AppImage
            dist/Consiglio-*.deb
          if-no-files-found: error
          retention-days: 14
