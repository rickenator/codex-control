name: CI

on:
  push:
    branches: [slave, main, develop]
  pull_request:
    branches: [slave, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify on ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
          - name: Windows
            runner: windows-2022
          - name: macOS
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check application
        run: npm run typecheck

      - name: Test application
        run: npm test

      - name: Build application
        run: npm run build

  mobile-web:
    name: Verify mobile client
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Verify mobile application
        run: npm run build

      - name: Audit mobile production dependencies
        run: npm audit --omit=dev --audit-level=high

  mobile-android:
    name: Build Android client
    needs: mobile-web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install and sync mobile client
        working-directory: mobile
        run: |
          npm ci
          npm run sync

      - name: Build Android debug APK
        working-directory: mobile/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: Consiglio-android-debug-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  mobile-ios:
    name: Build iOS client
    needs: mobile-web
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install and sync mobile client
        working-directory: mobile
        run: |
          npm ci
          npm run sync

      - name: Build iOS simulator application
        working-directory: mobile/ios/App
        run: >-
          xcodebuild
          -project App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/DerivedData
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Verify iOS simulator application
        run: test -d mobile/ios/App/build/DerivedData/Build/Products/Debug-iphonesimulator/App.app

      - name: Upload iOS simulator application
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: Consiglio-ios-simulator-${{ github.sha }}
          path: mobile/ios/App/build/DerivedData/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            command: package:linux
            artifact: Consiglio-linux-x64
          - name: Windows x64
            runner: windows-2022
            command: package:win
            artifact: Consiglio-windows-x64
          - name: macOS Intel
            runner: macos-15-intel
            command: package:mac
            artifact: Consiglio-macos-x64
          - name: macOS Apple Silicon
            runner: macos-15
            command: package:mac
            artifact: Consiglio-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run ${{ matrix.command }}

      - name: Validate package internals
        run: npm run validate:package

      - name: Upload packages
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: |
            dist/Consiglio-*.AppImage
            dist/Consiglio-*.deb
            dist/Consiglio-*.dmg
            dist/Consiglio-*.zip
            dist/Consiglio-*.exe
          if-no-files-found: error
          retention-days: 14
