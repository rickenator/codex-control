name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type check & contract validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate session options contract
        run: |
          # This file contains compile-time type assertions that must pass.
          # If the contract breaks, tsc --noEmit above will catch it.
          echo "Session options contract validated via tsc --noEmit"

  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: type-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_script: package:linux
          - os: macos-latest
            package_script: package:mac
          - os: windows-latest
            package_script: package:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Build app
        run: npm run build

      - name: Package app
        run: npm run ${{ matrix.package_script }} -- --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Consiglio-${{ matrix.os }}-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          if-no-files-found: error
