name: CI

on:
  push:
    branches: [slave, main, develop]
  pull_request:
    branches: [slave, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify on ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
          - name: Windows
            runner: windows-2022
          - name: macOS
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run verify

  package:
    name: Package ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            command: package:linux
            artifact: Consiglio-linux-x64
          - name: Windows x64
            runner: windows-2022
            command: package:win
            artifact: Consiglio-windows-x64
          - name: macOS Intel
            runner: macos-15-intel
            command: package:mac
            artifact: Consiglio-macos-x64
          - name: macOS Apple Silicon
            runner: macos-15
            command: package:mac
            artifact: Consiglio-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run ${{ matrix.command }}

      - name: Validate package internals
        run: npm run validate:package

      - name: Upload packages
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: |
            dist/Consiglio-*.AppImage
            dist/Consiglio-*.deb
            dist/Consiglio-*.dmg
            dist/Consiglio-*.zip
            dist/Consiglio-*.exe
          if-no-files-found: error
          retention-days: 14
