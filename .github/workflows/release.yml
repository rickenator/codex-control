name: Release Consiglio

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/tag to release, for example v0.1.1'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} packages
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_script: package:linux
          - os: macos-latest
            package_script: package:mac
          - os: windows-latest
            package_script: package:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Build app
        run: npm run build

      - name: Package app
        run: npm run ${{ matrix.package_script }} -- --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Consiglio-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Consiglio ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
