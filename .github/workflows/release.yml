name: Release Consiglio

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag matching package.json, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        id: version
        env:
          REQUESTED_TAG: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$REQUESTED_TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Release tag $REQUESTED_TAG must match package.json version v$PACKAGE_VERSION" >&2
            exit 1
          fi
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify application
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Create release SBOM
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          npm sbom --omit=dev --sbom-format=spdx --sbom-type=application > "Consiglio-${PACKAGE_VERSION}.spdx.json"

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Consiglio-release-metadata
          path: Consiglio-*.spdx.json
          if-no-files-found: error
          retention-days: 30

  package:
    name: Package ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            command: package:linux
            artifact: Consiglio-linux-x64
          - name: Windows x64
            runner: windows-2022
            command: package:release:win
            artifact: Consiglio-windows-x64
          - name: macOS x64
            runner: macos-15-intel
            command: package:release:mac
            artifact: Consiglio-macos-x64
          - name: macOS arm64
            runner: macos-15
            command: package:release:mac
            artifact: Consiglio-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require macOS signing and notarization credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required GitHub Actions secret for $name" >&2
              exit 1
            fi
          done

      - name: Require Windows signing credentials
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          foreach ($name in @('WIN_CSC_LINK', 'WIN_CSC_KEY_PASSWORD')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing required GitHub Actions secret for $name"
            }
          }

      - name: Package Linux application
        if: runner.os == 'Linux'
        run: npm run ${{ matrix.command }}

      - name: Package signed and notarized macOS application
        if: runner.os == 'macOS'
        run: npm run ${{ matrix.command }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Package signed Windows application
        if: runner.os == 'Windows'
        run: npm run ${{ matrix.command }}
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Validate package internals
        run: npm run validate:package
        env:
          REQUIRE_CODE_SIGNING: ${{ runner.os != 'Linux' && 'true' || 'false' }}
          REQUIRE_NOTARIZATION: ${{ runner.os == 'macOS' && 'true' || 'false' }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/Consiglio-*.AppImage
            dist/Consiglio-*.deb
            dist/Consiglio-*.dmg
            dist/Consiglio-*.zip
            dist/Consiglio-*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: [verify, package]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: release-artifacts
        run: sha256sum Consiglio-* > SHA256SUMS.txt

      - name: Attest release provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-checksums: release-artifacts/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Consiglio ${{ needs.verify.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.verify.outputs.tag, '-') }}
          files: release-artifacts/*
          fail_on_unmatched_files: true
