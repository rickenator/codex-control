name: Release Consiglio

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag matching package.json, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        id: version
        env:
          REQUESTED_TAG: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$REQUESTED_TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Release tag $REQUESTED_TAG must match package.json version v$PACKAGE_VERSION" >&2
            exit 1
          fi
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"

      - name: Type check Electron
        run: ./node_modules/.bin/tsc --noEmit -p tsconfig.json

      - name: Type check renderer
        run: ./node_modules/.bin/tsc --noEmit -p src/tsconfig.json

      - name: Build application
        run: npm run build

  package:
    name: Package ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            command: package:linux
            artifact: Consiglio-linux-x64
          - name: Windows x64
            runner: windows-2022
            command: package:win
            artifact: Consiglio-windows-x64
          - name: macOS x64
            runner: macos-15-intel
            command: package:mac
            artifact: Consiglio-macos-x64
          - name: macOS arm64
            runner: macos-15
            command: package:mac
            artifact: Consiglio-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package application
        run: npm run ${{ matrix.command }}

      - name: Validate Linux packages
        if: runner.os == 'Linux'
        run: |
          test -s dist/Consiglio-*.AppImage
          test -s dist/Consiglio-*.deb
          dpkg-deb --info dist/Consiglio-*.deb

      - name: Validate macOS packages
        if: runner.os == 'macOS'
        run: |
          test -s dist/Consiglio-*.dmg
          test -s dist/Consiglio-*.zip

      - name: Validate Windows packages
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packages = Get-ChildItem dist -Filter 'Consiglio-*.exe'
          if ($packages.Count -lt 2) {
            throw "Expected setup and portable Windows executables; found $($packages.Count)"
          }
          $packages | ForEach-Object {
            if ($_.Length -eq 0) { throw "$($_.Name) is empty" }
          }

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/Consiglio-*.AppImage
            dist/Consiglio-*.deb
            dist/Consiglio-*.dmg
            dist/Consiglio-*.zip
            dist/Consiglio-*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: [verify, package]
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: release-artifacts
        run: sha256sum Consiglio-* > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Consiglio ${{ needs.verify.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.verify.outputs.tag, '-') }}
          files: release-artifacts/*
          fail_on_unmatched_files: true
