version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: slave
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      development-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    target-branch: slave
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /mobile
    target-branch: slave
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      mobile-development-dependencies:
        dependency-type: development

  - package-ecosystem: gradle
    directory: /mobile/android
    target-branch: slave
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
